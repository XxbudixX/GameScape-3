<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameScape - My Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="modal-page">

  <div class="profile-container">
    <button class="close-btn" onclick="window.parent.closeModalPage()">&#x2715;</button>

    <!--  AVATAR + NAME + ICONS  -->
    <div class="avatar-box">
      <div class="avatar-circle" title="Pick avatar" onclick="toggleAvatarPicker()">
        <img id="profileAvatar"
             src="https://api.dicebear.com/7.x/avataaars/svg?seed=default"
             alt="Profile avatar" class="avatar-img">
      </div>
      <div id="avatarPicker" class="avatar-picker" style="display:none;"></div>
      <h3 id="profileName">Loading...</h3>

      <div class="action-icons">
        <!-- Edit -->
        <div class="icon-link" id="editBtn" title="Edit profile" onclick="toggleEdit()">
          <svg viewBox="0 0 24 24">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </div>
        <!-- Share -->
        <div class="icon-link" title="Share profile">
          <svg viewBox="0 0 24 24">
            <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
          </svg>
        </div>
        <!-- Eye / visibility toggle -->
        <div class="icon-link" id="visibilityBtn" title="Hide me from map">
          <svg viewBox="0 0 24 24">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
      </div>
    </div>

    <!--  GAMES (Steam)  -->
    <div class="game-box">
      <div id="gamesView" style="width:100%;display:flex;justify-content:space-around;flex-wrap:wrap;gap:8px;align-items:center;">
        <span class="empty-hint">No games added yet</span>
      </div>
      <div id="gamesEdit" style="display:none;width:100%;padding:4px 0;">
        <div id="gamesEditList"></div>
        <button class="steam-add-btn" onclick="openSteamModal()">
          <svg width="14" height="14" viewBox="0 0 24 24">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm0 18c-4.418 0-8-3.582-8-8s3.582-8 8-8 8 3.582 8 8-3.582 8-8 8zm-1-13h2v4h4v2h-4v4h-2v-4H7v-2h4V7z"/>
          </svg>
          Add from Steam
        </button>
      </div>
    </div>

    <!--  ABOUT ME  -->
    <div class="about-box">
      <p class="about-title">About Me</p>
      <p id="aboutView" class="about-text empty-hint">No description yet</p>
      <textarea class="edit-input" id="aboutEdit" rows="2"
                placeholder="Tell other players about yourself..."
                style="display:none;"></textarea>
    </div>

    <!--  INTERESTS plain text, no icon grid  -->
    <div class="about-box" style="margin-top:8px;">
      <p class="about-title">Interests</p>
      <!-- View mode: just plain text -->
      <p id="interestsView" class="about-text empty-hint">No interests added yet</p>
      <!-- Edit mode: free-text input -->
      <div id="interestsEdit" style="display:none;">
        <input class="edit-input" type="text" id="interestsInput"
               placeholder="e.g. PC Gaming, FPS, Controller, Speedrunning">
      </div>
    </div>

    <!--  CONTACT BOXES Discord & Steam 
         Click a box to open a copy popup.
         Visible always; editable only in edit mode.
     -->
    <div class="contact-boxes">

      <!-- Discord box -->
      <div class="contact-box" id="discordBox" onclick="openContactPopup('discord')" title="Click to copy">
        <div class="contact-box-icon">
          <!-- Discord logo icon -->
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
        </div>
        <div class="contact-box-content">
          <span class="contact-box-label">Discord</span>
          <span class="contact-box-value" id="discordView">Not set</span>
        </div>
        <div class="contact-box-copy-hint">click to copy</div>
      </div>

      <!-- Steam box -->
      <div class="contact-box" id="steamBox" onclick="openContactPopup('steam')" title="Click to copy">
        <div class="contact-box-icon">
          <!-- Steam icon -->
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879L2 12.184V12C2 6.477 6.477 2 12 2zm0 0c5.523 0 10 4.477 10 10s-4.477 10-10 10a9.956 9.956 0 0 1-5.406-1.587l3.29-1.362A3.5 3.5 0 1 0 13.5 13.5v-.043l-3.26 2.367A3.501 3.501 0 0 0 6.5 13.5a3.499 3.499 0 0 0 3.063 3.474l-1.85.766A8.001 8.001 0 0 1 4 12c0-4.418 3.582-8 8-8z"/>
          </svg>
        </div>
        <div class="contact-box-content">
          <span class="contact-box-label">Steam</span>
          <span class="contact-box-value" id="steamUsernameView">Not set</span>
        </div>
        <div class="contact-box-copy-hint">click to copy</div>
      </div>

    </div>

    <!-- Save button (edit mode only) -->
    <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Profile</button>

    <!-- Sign Out at the very bottom -->
    <button class="logout-btn" id="logoutBtn" onclick="logoutUser()">Sign Out</button>
  </div>


  <!--  CONTACT COPY POPUP 
       Opens when the user clicks a contact box.
       Shows the value in a selectable input + a Copy button.
   -->
  <div class="contact-popup-overlay" id="contactPopupOverlay" onclick="closeContactPopup()">
    <div class="contact-popup" onclick="event.stopPropagation()">
      <button class="contact-popup-close" onclick="closeContactPopup()">X</button>
      <div class="contact-popup-icon" id="contactPopupIcon"></div>
      <p class="contact-popup-label" id="contactPopupLabel">Discord</p>
      <!-- Editable input type your name or copy existing value -->
      <input class="contact-popup-input" id="contactPopupInput" placeholder="">
      <div class="contact-popup-actions">
        <!-- Save always visible, persists the typed value -->
        <button class="contact-popup-save" id="contactPopupSaveBtn" onclick="saveContact()">Save</button>
        <!-- Copy only shown when a value already exists -->
        <button class="contact-popup-copy" id="contactPopupCopyBtn" onclick="copyContact()" style="display:none;">Copy</button>
      </div>
      <p class="contact-popup-feedback" id="contactPopupFeedback"></p>
    </div>
  </div>


  <!--  STEAM SEARCH MODAL  -->
  <div class="steam-modal-overlay" id="steamModalOverlay">
    <div class="steam-modal-card">
      <div class="steam-modal-header">
        <span class="steam-modal-title">Add Games from Steam</span>
        <div class="steam-logo-badge">
          <svg width="12" height="12" viewBox="0 0 24 24">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/>
          </svg>
          STEAM
        </div>
        <button class="steam-modal-close" onclick="closeSteamModal()">X</button>
      </div>
      <div class="steam-search-wrap">
        <input class="steam-search-input" id="steamSearchInput" type="text"
               placeholder="Search for a game e.g. Valorant, CS2…">
      </div>
      <p class="steam-modal-msg" id="steamMsg"></p>
      <div class="steam-results" id="steamResults"></div>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
