<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameScape - Login</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="modal-page">

  <div class="login-container">
    <button class="close-btn" onclick="window.parent.closeModalPage()">X</button>

    <div class="heading">
      <span class="heading-main">Game</span><span class="heading-accent">Scape</span>
    </div>
    <div class="subheading">Sign in to continue</div>

    <div id="errorMsg" class="error-msg"></div>

    <form class="form" id="loginForm">
      <input required class="input" type="text"     id="username_or_email" placeholder="Username or Email">
      <input required class="input" type="password" id="password"          placeholder="Password">
      <span class="forgot-password"><a href="#">Forgot Password?</a></span>
      <button class="login-button" type="submit" id="loginBtn">Sign In</button>
    </form>

    <div class="divider"><span>or</span></div>

    <div class="social-accounts">
      <button class="social-button google">
        <img class="svg" src="/static/icons/google.svg" alt="Google">
      </button>
      <button class="social-button apple">
        <img class="svg" src="/static/icons/apple.svg" alt="Apple">
      </button>
      <button class="social-button twitter">
        <img class="svg" src="/static/icons/x.svg" alt="X">
      </button>
    </div>

    <div class="signup-prompt">
      Don't have an account?
      <a href="#" onclick="window.parent.openModalPage('/register');return false;">Sign up</a>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
