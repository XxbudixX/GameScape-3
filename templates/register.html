<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameScape - Register</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="modal-page">

  <div class="register-container">
    <button class="close-btn" onclick="window.parent.closeModalPage()">✕</button>

    <div class="heading">
      <span class="heading-main">Create</span><span class="heading-accent"> Account</span>
    </div>
    <div class="subheading">Join GameScape today</div>

    <div id="errorMsg" class="error-msg"></div>

    <form class="form" id="registerForm">

      <div class="input-group">
        <label>Username</label>
        <input class="input" type="text" id="username" placeholder="Username" required>
      </div>

      <div class="password-row">
        <div class="input-group">
          <label>Password</label>
          <input class="input" type="password" id="password" placeholder="Password" required>
        </div>
        <div class="input-group">
          <label>Confirm Password</label>
          <input class="input" type="password" id="confirm_password" placeholder="Confirm password" required>
        </div>
      </div>

      <div class="input-group">
        <label>Full Name</label>
        <input class="input" type="text" id="full_name" placeholder="Full name">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input class="input" type="email" id="email" placeholder="email@example.com" required>
      </div>

      <div class="input-group">
        <label>Birthday</label>
        <input class="input" type="date" id="birthday">
      </div>

      <div class="gender-group">
        <label class="gender-label">Gender</label>
        <div class="gender-options">
          <label class="gender-option"><input type="radio" value="male"   name="gender"> Male</label>
          <label class="gender-option"><input type="radio" value="female" name="gender"> Female</label>
        </div>
      </div>

      <div class="terms-group">
        <input type="checkbox" id="terms" class="checkbox" required>
        <label for="terms">I accept the <a href="#" onclick="window.parent.openModalPage('/terms');return false;">Terms and Conditions</a></label>
      </div>

      <button class="register-button" type="submit" id="registerBtn">Register</button>
    </form>

    <div class="login-prompt">
      Already have an account?
      <a href="#" onclick="window.parent.openModalPage('/login');return false;">Sign in</a>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
