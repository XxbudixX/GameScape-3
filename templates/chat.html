<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameScape - Chat</title>
  <!-- Orbitron for the "Chats" heading, Quicksand for all body text -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Single CSS file (all chat styles merged into main.css) -->
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<!-- chat-page class scopes the animated background blobs and mobile panels -->
<body class="chat-page">

  <div class="chat-fullscreen">

    <!--  TOP BAR 
         Back button on the left, connection status on the right.
         The old project had a manual "Connect" button removed here because
         app.js now auto-connects the WebSocket on session load.
         URL UPDATED: ../index.html → /map (Flask route).
     -->
    <div class="top-bar">
      <div class="back-button" onclick="window.location.href='/map'">
        <span>←</span> Back to Map
      </div>
      <!-- Connection status is set dynamically by app.js initChat() -->
      <span id="connectionStatus" class="status-offline">Offline</span>
    </div>

    <div class="chat-layout">

      <!--  CONTACTS PANEL 
           id="contactsPanel" is required by app.js for
           mobile panel switching (panel-hidden / panel-visible classes).

           The unified search bar does two things simultaneously:
             1. Filters existing contacts client-side (instant)
             2. Queries /api/users/search for new users (debounced 300ms)
           Results from the DB search appear in the #userSearchResults dropdown.
       -->
      <div class="contacts-panel" id="contactsPanel">
        <div class="contacts-header">
          <!-- Orbitron heading matching the old chat page -->
          <h3>Chats</h3>

          <!-- Search wrap with SVG icon replaces old plain .search-box -->
          <div class="search-wrap">
            <!-- Magnifying glass icon positioned inside the input via CSS -->
            <svg class="search-icon" viewBox="0 0 24 24">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input
              type="text"
              id="searchInput"
              placeholder="Search or start new chat…"
              autocomplete="off"
            >
          </div>

          <!-- Dropdown for DB user search results.
               Hidden by default; app.js shows it when the search finds new users. -->
          <div id="userSearchResults" class="user-search-results" style="display:none;"></div>

          <button id="addFriendToggle" class="add-friend-toggle" type="button">+ Add a friend</button>
          <div id="addFriendBox" class="add-friend-box" style="display:none;">
            <input type="text" id="addFriendInput" placeholder="Username">
            <button id="addFriendBtn" type="button">Add</button>
            <div id="addFriendMsg" class="add-friend-msg"></div>
          </div>

          <div class="chat-friend-tabs">
            <button class="chat-friend-tab active" data-chat-tab="inbox" type="button">Inbox</button>
            <button class="chat-friend-tab" data-chat-tab="friends" type="button">Friends</button>
            <button class="chat-friend-tab" data-chat-tab="requests" type="button">Requests</button>
          </div>
          <div id="friendRequestsList" class="friend-requests-list" style="display:none;"></div>
        </div>

        <div class="contacts-list" id="contactsList">
          <div class="contact-placeholder">Loading chats…</div>
        </div>
      </div>

      <!--  CONVERSATION PANEL 
           id="conversationPanel" is required for mobile panel switching.
           On mobile this slides in from the right when a contact is tapped.
       -->
      <div class="conversation-panel" id="conversationPanel">

        <div class="conversation-header">
          <!--  Mobile back arrow hidden on desktop via CSS.
               showContactsPanel() is exposed globally by app.js. -->
          <button class="mobile-back-btn" id="mobileBackBtn" onclick="showContactsPanel()">←</button>

          <div class="user-info">
            <!-- Avatar div app.js sets textContent to the first letter of the partner's username -->
            <div class="user-avatar" id="chatPartnerAvatar"></div>
            <div class="user-name-block">
              <span class="user-name" id="currentChatName">Select a friend</span>
              <!-- Online status shown under the name updated by app.js updatePartnerStatus() -->
              <span class="partner-status" id="chatPartnerStatus"></span>
            </div>
          </div>
        </div>

        <div class="messages-container" id="messagesContainer">
          <div class="placeholder-message">Select a contact to start chatting</div>
        </div>

        <div class="message-input-area">
          <input type="text" id="messageInput" placeholder="Type a message…" disabled>
          <button id="sendBtn" disabled>Send</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
