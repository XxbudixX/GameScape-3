<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Prevents mobile browsers from zooming out to show the full desktop layout. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameScape - Chat</title>

  <!-- Orbitron for the "Chats" panel heading. Quicksand for everything else. -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="chat.css">
</head>
<body>
  <!-- The full-screen chat wrapper. chat.css makes this a vertical flex column
       that fills 100vh so the top bar, layout area, and nothing else exists
       outside this div. z-index: 1 keeps it above the background light beams. -->
  <div class="chat-fullscreen">

    <!-- ============================================================
         TOP BAR
         Spans the full width at the top of the page.
         Left side: back button that navigates to the map.
         Right side: connection status, username field, and connect button.
         ============================================================ -->
    <div class="top-bar">
      <!-- Navigates back to the main map page.
           Uses window.location.href instead of a link so it can be styled as a div. -->
      <div class="back-button" onclick="window.location.href='../index.html'">
        <span>←</span> Back to Map
      </div>

      <!-- The connection control area on the right side of the top bar. -->
      <div class="connection-area">
        <!-- Status badge. chat.js updates its text and class between
             "Offline" (.status-offline) and "Connected as {name}" (.status-online). -->
        <span id="connectionStatus" class="status-offline">Offline</span>

        <!-- Username input for manually connecting via WebSocket.
             chat.js makes this read-only and pre-fills it when the user is
             already logged in via the Flask session. -->
        <input type="text" id="usernameInput" placeholder="Username" class="username-field">

        <!-- Toggles the WebSocket connection. chat.js changes its label
             between "Connect" and "Disconnect" depending on the current state. -->
        <button id="connectBtn" class="connect-btn">Connect</button>
      </div>
    </div>

    <!-- ============================================================
         MAIN CHAT LAYOUT
         A horizontal flex row that fills all remaining vertical space.
         Left panel: contacts list (fixed width).
         Right panel: active conversation (fills remaining space).
         ============================================================ -->
    <div class="chat-layout">

      <!-- ============================================================
           CONTACTS PANEL (left)
           Shows everyone the user has previously messaged (from the DB)
           plus anyone currently online via WebSocket.
           Clicking a contact opens their conversation on the right.
           ============================================================ -->
      <div class="contacts-panel">
        <div class="contacts-header">
          <h3>Chats</h3>
          <!-- Live search input. chat.js filters the visible contact items
               as the user types, without touching the underlying data. -->
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search friends...">
          </div>
        </div>

        <!-- The scrollable area where contact rows are rendered by chat.js.
             The placeholder text is replaced once contacts load from the DB or
             the WebSocket connection is established. -->
        <div class="contacts-list" id="contactsList">
          <div class="contact-placeholder">Connect to see online friends</div>
        </div>
      </div>

      <!-- ============================================================
           CONVERSATION PANEL (right)
           Fills all horizontal space to the right of the contacts panel.
           Contains three stacked sections: a header, the message list,
           and the message input bar. chat.js fills and manages all three.
           ============================================================ -->
      <div class="conversation-panel">

        <!-- Header shows who the current conversation is with.
             #currentChatName is updated by chat.js when a contact is clicked. -->
        <div class="conversation-header">
          <div class="user-info">
            <!-- Placeholder avatar circle. No image is loaded — the gradient
                 background in CSS serves as the visual. -->
            <div class="user-avatar"></div>
            <!-- Updated by chat.js with the selected contact's username. -->
            <span class="user-name" id="currentChatName">Select a friend</span>
          </div>
        </div>

        <!-- The scrollable message list. chat.js clears and rebuilds this
             every time a contact is clicked or a new message arrives.
             The placeholder text disappears once a conversation is opened. -->
        <div class="messages-container" id="messagesContainer">
          <div class="placeholder-message">Connect and click on a friend to start chatting</div>
        </div>

        <!-- The message input bar at the bottom of the conversation panel.
             Both the input and the button start disabled — chat.js enables them
             once a conversation is opened. The button also responds to Enter key
             via a keypress listener in chat.js. -->
        <div class="message-input-area">
          <input type="text" id="messageInput" placeholder="Type a message..." disabled>
          <button id="sendBtn" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- chat.js manages: session check, DB contact loading, WebSocket connection,
       message rendering, send logic, and contact list filtering.
       Loaded at the bottom so all elements exist before the script runs. -->
  <script src="chat.js"></script>
</body>
</html>
